name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Create local.properties
        run: |
          echo "AI_API_KEY=${{ secrets.AI_API_KEY }}" >> local.properties
          echo "THERAPIST_API_KEY=${{ secrets.THERAPIST_API_KEY }}" >> local.properties
          echo "sdk.dir=$ANDROID_HOME" >> local.properties

      - name: Create apikey.properties
        run: |
          echo "AI_API_KEY=${{ secrets.AI_API_KEY }}" >> app/apikey.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Android Lint
        run: ./gradlew lintDebug --no-daemon

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Create local.properties
        run: |
          echo "AI_API_KEY=${{ secrets.AI_API_KEY }}" >> local.properties
          echo "THERAPIST_API_KEY=${{ secrets.THERAPIST_API_KEY }}" >> local.properties
          echo "sdk.dir=$ANDROID_HOME" >> local.properties

      - name: Create apikey.properties
        run: |
          echo "AI_API_KEY=${{ secrets.AI_API_KEY }}" >> app/apikey.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/

  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Create local.properties
        run: |
          echo "AI_API_KEY=${{ secrets.AI_API_KEY }}" >> local.properties
          echo "THERAPIST_API_KEY=${{ secrets.THERAPIST_API_KEY }}" >> local.properties
          echo "sdk.dir=$ANDROID_HOME" >> local.properties

      - name: Create apikey.properties
        run: |
          echo "AI_API_KEY=${{ secrets.AI_API_KEY }}" >> app/apikey.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk